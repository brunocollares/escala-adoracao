<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controle — Ministério de Comunicação</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-principal: #0a051b;
            --bg-card: #140d34;
            --purple-neon: #8a2be2;
            --magenta-neon: #ff007f;
            --cyan-neon: #00ffff;
            --yellow-neon: #ffea00;
            --texto-puro: #ffffff;
            --texto-mutado: #6e648e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-puro);
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            padding: 2rem 1rem;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 0, 127, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(138, 43, 226, 0.15) 0%, transparent 40%);
            background-attachment: fixed;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Estilo da Logo do Ministério */
        .logo-site {
            max-width: 180px; 
            height: auto;
            margin-bottom: 1.5rem;
            /* Um leve brilho branco/azulado para destacar o texto azul no fundo escuro */
            filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.3)); 
            animation: fadeIn 1s ease-out;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(45deg, var(--texto-puro), var(--cyan-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
            margin-bottom: 0.5rem;
        }

        /* Estilo do Subtítulo Editável */
        .subtitle-input {
            background: transparent;
            border: 1px solid transparent;
            font-size: 1.2rem;
            color: var(--magenta-neon);
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 600;
            text-align: center;
            width: 100%;
            max-width: 400px;
            font-family: 'Rajdhani', sans-serif;
            padding: 0.3rem;
            transition: all 0.3s ease;
        }

        .editing-mode .subtitle-input:not(:disabled) {
            border: 1px dashed var(--magenta-neon);
            background: rgba(255, 0, 127, 0.05);
            border-radius: 4px;
        }

        .subtitle-input:focus { outline: none; border-color: var(--cyan-neon); }

        .btn-edit {
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid var(--cyan-neon);
            color: var(--cyan-neon);
            font-family: 'Orbitron', sans-serif;
            padding: 0.6rem 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            margin-bottom: 2rem;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-edit:hover { background: var(--cyan-neon); color: var(--bg-principal); box-shadow: 0 0 20px rgba(0, 255, 255, 0.4); }
        .btn-edit.saving { border-color: var(--magenta-neon); color: var(--magenta-neon); background: rgba(255, 0, 127, 0.1); }
        .btn-edit.saving:hover { background: var(--magenta-neon); color: var(--texto-puro); box-shadow: 0 0 20px rgba(255, 0, 127, 0.4); }

        /* Estrutura KANBAN */
        .kanban-board {
            display: flex;
            gap: 1.5rem;
            max-width: 1400px;
            margin: 0 auto;
            align-items: flex-start;
        }

        .kanban-column {
            flex: 1;
            min-width: 300px;
            background: linear-gradient(180deg, rgba(20, 13, 52, 0.9) 0%, rgba(10, 5, 27, 0.9) 100%);
            border: 1px solid var(--purple-neon);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.2);
            position: relative;
            animation: fadeIn 1s ease-out backwards;
            display: flex;
            flex-direction: column;
        }

        .kanban-column:nth-child(1) { animation-delay: 0.1s; border-top: 4px solid var(--magenta-neon); }
        .kanban-column:nth-child(2) { animation-delay: 0.2s; border-top: 4px solid var(--cyan-neon); }
        .kanban-column:nth-child(3) { animation-delay: 0.3s; border-top: 4px solid var(--yellow-neon); }

        .column-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            text-align: center;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.2);
        }

        .kanban-column:nth-child(1) .column-title { color: var(--magenta-neon); text-shadow: 0 0 8px var(--magenta-neon); }
        .kanban-column:nth-child(2) .column-title { color: var(--cyan-neon); text-shadow: 0 0 8px var(--cyan-neon); }
        .kanban-column:nth-child(3) .column-title { color: var(--yellow-neon); text-shadow: 0 0 8px var(--yellow-neon); }

        /* Container para os cartões rolarem ou se empilharem internamente se necessário */
        .cards-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .kanban-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 1rem;
            transition: all 0.3s ease;
        }

        .kanban-card:hover { background: rgba(255, 255, 255, 0.06); transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5); }

        .kanban-column:nth-child(1) .kanban-card { border-left: 3px solid var(--magenta-neon); }
        .kanban-column:nth-child(2) .kanban-card { border-left: 3px solid var(--cyan-neon); }
        .kanban-column:nth-child(3) .kanban-card { border-left: 3px solid var(--yellow-neon); }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .date-input-cyber {
            background: rgba(0, 0, 0, 0.5);
            color: var(--texto-puro);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            font-weight: bold;
            padding: 0.3rem 0.5rem;
            border-radius: 4px;
            border: 1px solid var(--purple-neon);
            outline: none;
            width: 135px;
            pointer-events: none;
        }

        .editing-mode .date-input-cyber { border: 1px dashed var(--cyan-neon); background: #1a0f44; cursor: pointer; pointer-events: auto; }
        .date-input-cyber::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; opacity: 0.5; }

        .status-tag { font-family: 'Orbitron', sans-serif; font-size: 0.7rem; font-weight: bold; padding: 0.3rem 0.5rem; border-radius: 4px; text-transform: uppercase; }
        .status-tag.hoje { background: var(--magenta-neon); color: var(--texto-puro); box-shadow: 0 0 10px var(--magenta-neon); animation: pulse 1.5s infinite; }
        .status-tag.futuro { background: rgba(255, 234, 0, 0.1); color: var(--yellow-neon); border: 1px solid var(--yellow-neon); }
        .status-tag.finalizado { background: rgba(110, 100, 142, 0.2); color: var(--texto-mutado); border: 1px solid rgba(110, 100, 142, 0.4); }

        .cell-group { display: flex; flex-direction: column; margin-bottom: 0.6rem; }
        .cell-group:last-child { margin-bottom: 0; }
        .cell-group::before {
            content: attr(data-label); color: var(--texto-mutado); font-family: 'Orbitron', sans-serif; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 0.2rem; letter-spacing: 1px;
        }

        .role-input {
            background: transparent; border: 1px solid transparent; color: var(--texto-puro); font-family: 'Rajdhani', sans-serif; font-size: 1.1rem; font-weight: 500; padding: 0.3rem; border-radius: 4px; width: 100%;
        }

        .editing-mode .role-input:not(:disabled) { border: 1px dashed var(--texto-mutado); background: rgba(255, 255, 255, 0.05); }
        .role-input:focus { outline: none; border-color: var(--cyan-neon) !important; background: rgba(0, 255, 255, 0.05) !important;}

        /* Botão Dinâmico de Adicionar Cartão */
        .btn-add-card {
            width: 100%;
            background: transparent;
            border: 1px dashed var(--texto-mutado);
            color: var(--texto-mutado);
            padding: 0.8rem;
            margin-top: 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.3s ease;
            display: none; 
        }

        .editing-mode .btn-add-card { display: block; }

        .btn-add-card:hover {
            border-color: var(--cyan-neon);
            color: var(--cyan-neon);
            background: rgba(0, 255, 255, 0.05);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { box-shadow: 0 0 5px var(--magenta-neon); } 50% { box-shadow: 0 0 15px var(--magenta-neon); } 100% { box-shadow: 0 0 5px var(--magenta-neon); } }

        @media (max-width: 1024px) {
            .kanban-board { flex-direction: column; align-items: stretch; }
            .kanban-column { width: 100%; margin-bottom: 1rem; }
        }
    </style>
</head>
<body>

    <header>
        <img src="LOGOMC-01.png" alt="Logo Ministério de Comunicação" class="logo-site">
        
        <h1>Painel de Mídia</h1>
        <input type="text" id="subtituloInput" class="subtitle-input" value="Junho / 2026" disabled>
    </header>

    <div style="text-align: center;">
        <button class="btn-edit" id="btnEdit" onclick="toggleEdit()">
            <span id="btnIcon">🔒</span> <span id="btnText">Ativar Edição</span>
        </button>
    </div>

    <div class="kanban-board" id="mainContainer">
        
        <div class="kanban-column">
            <div class="column-title">Escala de Serviço</div>
            
            <div class="cards-container">
                <div class="kanban-card">
                    <div class="card-header">
                        <input type="date" class="date-input-cyber" value="2026-06-02" onchange="atualizarStatusEscala()">
                        <span class="status-tag">...</span>
                    </div>
                    <div class="cell-group" data-label="YouTube"><input type="text" class="role-input" value="JM" disabled></div>
                    <div class="cell-group" data-label="Stories"><input type="text" class="role-input" value="Evi e Aninha" disabled></div>
                    <div class="cell-group" data-label="Câmera Móvel"><input type="text" class="role-input" value="Bea Santos e Amanda" disabled></div>
                </div>

                <div class="kanban-card">
                    <div class="card-header">
                        <input type="date" class="date-input-cyber" value="2026-06-09" onchange="atualizarStatusEscala()">
                        <span class="status-tag">...</span>
                    </div>
                    <div class="cell-group" data-label="YouTube"><input type="text" class="role-input" value="Maurício" disabled></div>
                    <div class="cell-group" data-label="Stories"><input type="text" class="role-input" value="Marília e Bea Santos" disabled></div>
                    <div class="cell-group" data-label="Câmera Móvel"><input type="text" class="role-input" value="Bia Nóbrega e Jéssica" disabled></div>
                </div>
            </div>

            <button class="btn-add-card" onclick="adicionarCartao(this)">+ Adicionar Novo Cartão</button>
        </div>

        <div class="kanban-column">
            <div class="column-title">Santos do Mês</div>
            
            <div class="cards-container">
                <div class="kanban-card">
                    <div class="card-header">
                        <input type="date" class="date-input-cyber" value="2026-06-12" onchange="atualizarStatusEscala()">
                        <span class="status-tag">...</span>
                    </div>
                    <div class="cell-group" data-label="Santo"><input type="text" class="role-input" value="São João Paulo II" disabled></div>
                    <div class="cell-group" data-label="Frase"><input type="text" class="role-input" value="Não tenhais medo!" disabled></div>
                    <div class="cell-group" data-label="Responsável"><input type="text" class="role-input" value="Marília" disabled></div>
                </div>

                <div class="kanban-card">
                    <div class="card-header">
                        <input type="date" class="date-input-cyber" value="2026-06-24" onchange="atualizarStatusEscala()">
                        <span class="status-tag">...</span>
                    </div>
                    <div class="cell-group" data-label="Santo"><input type="text" class="role-input" value="São João Batista" disabled></div>
                    <div class="cell-group" data-label="Frase"><input type="text" class="role-input" value="Preparai o caminho do Senhor." disabled></div>
                    <div class="cell-group" data-label="Responsável"><input type="text" class="role-input" value="Bruno" disabled></div>
                </div>
            </div>

            <button class="btn-add-card" onclick="adicionarCartao(this)">+ Adicionar Novo Cartão</button>
        </div>

        <div class="kanban-column">
            <div class="column-title">Frases do Mês</div>
            
            <div class="cards-container">
                <div class="kanban-card">
                    <div class="card-header">
                        <input type="date" class="date-input-cyber" value="2026-06-16" onchange="atualizarStatusEscala()">
                        <span class="status-tag">...</span>
                    </div>
                    <div class="cell-group" data-label="Frase / Tema"><input type="text" class="role-input" value="Alegria do Evangelho" disabled></div>
                    <div class="cell-group" data-label="Design / Card"><input type="text" class="role-input" value="Pronto para postar" disabled></div>
                    <div class="cell-group" data-label="Responsável"><input type="text" class="role-input" value="JM" disabled></div>
                </div>

                <div class="kanban-card">
                    <div class="card-header">
                        <input type="date" class="date-input-cyber" value="2026-06-28" onchange="atualizarStatusEscala()">
                        <span class="status-tag">...</span>
                    </div>
                    <div class="cell-group" data-label="Frase / Tema"><input type="text" class="role-input" value="Tudo por Jesus, nada sem Maria" disabled></div>
                    <div class="cell-group" data-label="Design / Card"><input type="text" class="role-input" value="Em produção" disabled></div>
                    <div class="cell-group" data-label="Responsável"><input type="text" class="role-input" value="Amanda" disabled></div>
                </div>
            </div>

            <button class="btn-add-card" onclick="adicionarCartao(this)">+ Adicionar Novo Cartão</button>
        </div>

    </div>

    <script>
        let isEditing = false;
        const senhaCorreta = "1234"; 

        function atualizarStatusEscala() {
            const cards = document.querySelectorAll('.kanban-card');
            const hoje = new Date();
            hoje.setHours(0,0,0,0);

            cards.forEach(card => {
                const inputData = card.querySelector('.date-input-cyber');
                if(!inputData) return;
                
                const dataString = inputData.value;
                if (!dataString) return;

                const [ano, mes, dia] = dataString.split('-');
                const dataEscala = new Date(ano, mes - 1, dia);
                dataEscala.setHours(0,0,0,0);

                const elementoStatus = card.querySelector('.status-tag');
                const diferencaTempo = dataEscala - hoje;
                const diferencaDias = Math.ceil(diferencaTempo / (1000 * 60 * 60 * 24));

                if (diferencaDias === 0) {
                    elementoStatus.innerText = "🔥 Hoje!";
                    elementoStatus.className = "status-tag hoje";
                } else if (diferencaDias > 0) {
                    elementoStatus.innerText = `🟡 Em ${diferencaDias} dia${diferencaDias > 1 ? 's' : ''}`;
                    elementoStatus.className = "status-tag futuro";
                } else {
                    elementoStatus.innerText = "✅ Feito";
                    elementoStatus.className = "status-tag finalizado";
                }
            });
        }

        window.onload = atualizarStatusEscala;

        function toggleEdit() {
            const inputsTexto = document.querySelectorAll('.role-input');
            const btn = document.getElementById('btnEdit');
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');
            const container = document.getElementById('mainContainer');
            const inputSubtitulo = document.getElementById('subtituloInput');

            if (!isEditing) {
                const senhaDigitada = prompt("Digite a senha de acesso (1234):");
                if (senhaDigitada === senhaCorreta) {
                    isEditing = true;
                    container.classList.add('editing-mode');
                    document.body.classList.add('editing-mode'); 
                    
                    inputsTexto.forEach(input => input.disabled = false);
                    inputSubtitulo.disabled = false; 
                    
                    btnText.innerText = "Salvar Painel";
                    btnIcon.innerText = "💾";
                    btn.classList.add('saving');
                } else if (senhaDigitada !== null) {
                    alert("Acesso Negado. Senha incorreta.");
                }
            } else {
                isEditing = false;
                container.classList.remove('editing-mode');
                document.body.classList.remove('editing-mode');
                
                inputsTexto.forEach(input => input.disabled = true);
                inputSubtitulo.disabled = true; 
                
                btnText.innerText = "Ativar Edição";
                btnIcon.innerText = "🔒";
                btn.classList.remove('saving');
                
                atualizarStatusEscala();
            }
        }

        function adicionarCartao(botao) {
            const coluna = botao.parentElement;
            const containerCartoes = coluna.querySelector('.cards-container');
            
            const modeloCard = containerCartoes.querySelector('.kanban-card').cloneNode(true);
            
            const inputsDeTexto = modeloCard.querySelectorAll('.role-input');
            inputsDeTexto.forEach(input => {
                input.value = "";
                input.disabled = false;
            });

            const inputData = modeloCard.querySelector('.date-input-cyber');
            if(inputData) {
                inputData.value = "";
            }

            const statusTag = modeloCard.querySelector('.status-tag');
            if(statusTag) {
                statusTag.innerText = "...";
                statusTag.className = "status-tag finalizado";
            }

            containerCartoes.appendChild(modeloCard);
        }
    </script>
</body>
</html>
